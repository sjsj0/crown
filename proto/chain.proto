syntax = "proto3";
import "google/protobuf/empty.proto";

package chain;

// ============================================================
// Enums
// ============================================================

enum ReplicationMode {
    CHAIN = 0;
    CRAQ  = 1;
    CROWN = 2;
}

// ============================================================
// Shared sub-messages
// ============================================================

message NodeAddress {
    string host = 1;
    int32  port = 2;
}

message KeyRange {
    // For CROWN mode these are token bounds (uint64 encoded as text), not
    // raw lexicographic key bounds.
    string start_key = 1;
    string end_key   = 2;
}

// ============================================================
// Config — pushed by client.cpp to each server on startup
// ============================================================

message NodeConfig {
    int32           node_id     = 1;
    NodeAddress     self_addr   = 2;
    ReplicationMode mode        = 3;
    bool            is_head     = 4;
    bool            is_tail     = 5;

    optional NodeAddress predecessor = 6;  // absent = no predecessor (head)
    optional NodeAddress successor   = 7;  // absent = no successor (tail)

    // CROWN mode only: token/hash ring ranges owned as head/tail.
    repeated KeyRange head_ranges = 8;
    repeated KeyRange tail_ranges = 9;
}

// ============================================================
// Client <-> Node RPCs
// ============================================================

message WriteRequest {
    string   key     = 1;
    string   value   = 2;
    uint64   version = 3; // client can leave 0; head assigns the real version
    string   client_addr = 4;
    uint64   request_id = 5;
}

message WriteResponse {
    bool   success = 1;
    uint64 version = 2; // success=true means head accepted; version is head-assigned and does NOT imply committed
}

message ReadRequest {
    string key = 1;
}

message ReadResponse {
    string key     = 1;
    string value   = 2;
    uint64 version = 3;
}

// ============================================================
// Node <-> Node RPCs (inter-node propagation)
// ============================================================

message PropagateRequest {
    string key       = 1;
    string value     = 2;
    uint64 version   = 3;
    string origin_id = 4; // node_id of the head that originated the write
    string client_addr = 5; // forwarded client identity/address for commit correlation
    uint64 request_id  = 6; // forwarded request correlation id
}

message AckRequest {
    string key     = 1;
    uint64 version = 2;
    string client_addr = 3; // client identity/address for async commit correlation
    uint64 request_id  = 4; // request correlation id from original write
}

// ============================================================
// CRAQ only — version query from non-tail to tail
// ============================================================

message VersionQueryRequest {
    string key = 1;
}

message VersionQueryResponse {
    string key             = 1;
    uint64 latest_version  = 2; // latest committed (clean) version at the tail
}

// ============================================================
// Service
// ============================================================

service ChainNode {
    // Client -> Node
    rpc Configure    (NodeConfig)          returns (google.protobuf.Empty);
    rpc Write        (WriteRequest)        returns (WriteResponse);
    rpc Read         (ReadRequest)         returns (ReadResponse);

    // Node -> Node (inter-node, but same service since every node runs it)
    rpc Propagate    (PropagateRequest)    returns (google.protobuf.Empty);
    rpc Ack          (AckRequest)         returns (google.protobuf.Empty);

    // CRAQ only
    rpc VersionQuery (VersionQueryRequest) returns (VersionQueryResponse);
}
